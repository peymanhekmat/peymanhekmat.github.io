<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Site Admin — phekmat.com</title>
  <style>
    :root{--navy:#0e1f3b;--navy-mid:#1a3260;--gold:#b8972a;--gold-light:#d4af50;--cream:#f7f4ef;--cream-dark:#ede9e0;--text:#1c1c1c;--text-muted:#5a5a5a;--white:#ffffff;--border:#d0c9b8;--green:#27ae60;--red:#c0392b;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--text);font-size:15px;}
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--navy);}
    .login-box{background:var(--white);padding:2.5rem;border-radius:8px;width:360px;border-top:4px solid var(--gold);}
    .login-box h1{font-size:1.3rem;color:var(--navy);margin-bottom:0.3rem;}
    .login-box p{font-size:0.82rem;color:var(--text-muted);margin-bottom:1.5rem;}
    .login-box input{width:100%;padding:0.65rem 0.85rem;border:1px solid var(--border);border-radius:4px;font-size:0.9rem;margin-bottom:0.75rem;outline:none;}
    .login-box input:focus{border-color:var(--navy);}
    .field-hint{font-size:0.73rem;color:#999;margin-bottom:0.3rem;margin-top:-0.4rem;}
    .btn-primary{background:var(--navy);color:var(--white);width:100%;padding:0.65rem;border:none;border-radius:4px;font-size:0.9rem;font-weight:600;cursor:pointer;}
    .btn-primary:hover{background:var(--navy-mid);}
    .login-error{color:var(--red);font-size:0.8rem;margin-top:0.5rem;display:none;}
    #main-screen{display:none;min-height:100vh;}
    header{background:var(--navy);border-bottom:3px solid var(--gold);padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;}
    header h1{font-size:1rem;color:var(--white);font-weight:600;}
    .site-link{font-size:0.78rem;color:var(--gold-light);text-decoration:none;}
    .site-link:hover{text-decoration:underline;}
    .btn-sm{padding:0.35rem 0.85rem;font-size:0.78rem;background:transparent;border:1px solid rgba(255,255,255,0.3);color:#b8c8e0;border-radius:3px;cursor:pointer;}
    .btn-sm:hover{border-color:var(--gold-light);color:var(--gold-light);}
    .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 58px);}
    .sidebar{background:var(--white);border-right:1px solid var(--border);padding:1.5rem 0;}
    .sidebar-label{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);padding:0 1.2rem;margin-bottom:0.4rem;margin-top:1rem;}
    .sidebar-label:first-child{margin-top:0;}
    .nav-item{display:block;width:100%;text-align:left;background:none;border:none;padding:0.55rem 1.2rem;font-size:0.85rem;color:var(--text);cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;}
    .nav-item:hover{background:var(--cream);color:var(--navy);}
    .nav-item.active{background:var(--cream);color:var(--navy);border-left-color:var(--gold);font-weight:600;}
    .content{padding:2rem;max-width:860px;}
    .content h2{font-size:1.2rem;color:var(--navy);margin-bottom:0.3rem;}
    .page-desc{font-size:0.82rem;color:var(--text-muted);margin-bottom:1.5rem;}
    .alert{padding:0.7rem 1rem;border-radius:4px;font-size:0.83rem;margin-bottom:1rem;}
    .alert-info{background:#e8f4fd;border:1px solid #b8d4f0;color:#1a5276;}
    .alert-warn{background:#fef9e7;border:1px solid #f9e79f;color:#7d6608;}

    /* TEXT EDITOR CARDS */
    .editor-card{background:var(--white);border:1px solid var(--border);border-radius:6px;margin-bottom:0.85rem;overflow:hidden;}
    .editor-card-header{padding:0.65rem 1rem;background:var(--cream-dark);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
    .editor-card-header:hover{background:#e5e0d5;}
    .editor-label{font-size:0.82rem;font-weight:600;color:var(--navy);}
    .editor-toggle{color:var(--text-muted);font-size:0.8rem;transition:transform 0.2s;}
    .editor-card.open .editor-toggle{transform:rotate(180deg);}
    .editor-body{display:none;padding:1rem;}
    .editor-card.open .editor-body{display:block;}
    .field-label{font-size:0.73rem;font-weight:700;color:var(--text-muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.05em;}
    .field-group{margin-bottom:0.85rem;}
    .field-group:last-child{margin-bottom:0;}
    textarea.field,input.field{width:100%;border:1px solid var(--border);border-radius:4px;padding:0.6rem 0.8rem;font-size:0.85rem;font-family:inherit;outline:none;}
    textarea.field{resize:vertical;min-height:80px;line-height:1.6;}
    textarea.field:focus,input.field:focus{border-color:var(--navy);}

    /* JSON LIST EDITOR */
    .list-item{background:var(--cream);border:1px solid var(--border);border-radius:4px;padding:0.9rem 1rem;margin-bottom:0.6rem;}
    .item-grid-2{display:grid;grid-template-columns:120px 1fr;gap:0.5rem;}
    .item-grid-half{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
    .btn-add{background:var(--green);color:var(--white);padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;margin-bottom:0.85rem;display:block;}
    .btn-add:hover{background:#219a52;}
    .btn-remove{background:var(--red);color:var(--white);padding:0.28rem 0.7rem;font-size:0.75rem;font-weight:600;border:none;border-radius:3px;cursor:pointer;margin-top:0.6rem;}
    .btn-remove:hover{background:#a93226;}

    /* SAVE BAR */
    .save-bar{display:flex;align-items:center;gap:0.75rem;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);}
    .btn-save{background:var(--navy);color:var(--white);padding:0.5rem 1.4rem;font-size:0.85rem;font-weight:600;border:none;border-radius:4px;cursor:pointer;}
    .btn-save:hover{background:var(--navy-mid);}
    .btn-save:disabled{opacity:0.5;cursor:not-allowed;}
    .save-status{font-size:0.8rem;}
    .save-status.saving{color:var(--text-muted);}
    .save-status.ok{color:var(--green);}
    .save-status.err{color:var(--red);}
    .loading{color:var(--text-muted);font-size:0.88rem;padding:0.5rem 0;}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite;margin-right:0.3rem;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>phekmat.com Admin</h1>
    <p>Enter your credentials to access the dashboard.</p>
    <input type="password" id="pwd-input" placeholder="Dashboard password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <p class="field-hint">GitHub Personal Access Token</p>
    <input type="password" id="token-input" placeholder="Paste your token here" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">
  <header>
    <h1>phekmat.com — Admin Dashboard</h1>
    <div style="display:flex;align-items:center;gap:1rem;">
      <a href="https://phekmat.com" target="_blank" class="site-link">View Site ↗</a>
      <button class="btn-sm" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-label">Pages</div>
      <button class="nav-item active" onclick="loadPage('index')">Home</button>
      <button class="nav-item" onclick="loadPage('about')">About</button>
      <button class="nav-item" onclick="loadPage('contact')">Contact</button>
      <button class="nav-item" onclick="loadPage('teaching')">Teaching (Philosophy)</button>
      <div class="sidebar-label">JSON Data</div>
      <button class="nav-item" onclick="loadJSON('publications')">Publications</button>
      <button class="nav-item" onclick="loadJSON('awards')">Awards &amp; Grants</button>
      <button class="nav-item" onclick="loadJSON('courses')">Teaching Courses</button>
      <div class="sidebar-label">Research Pages</div>
      <button class="nav-item" onclick="loadPage('project-eue')">EUE &amp; Air Pollution</button>
      <button class="nav-item" onclick="loadPage('project-fdi')">FDI &amp; Climate</button>
    </nav>
    <main class="content" id="content-area">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </main>
  </div>
</div>

<script>
// ── CONFIG ──
const OWNER = 'peymanhekmat';
const REPO  = 'peymanhekmat.github.io';
let TOKEN   = '';
const PASS  = atob('cGhla21hdDIwMjVhZG1pbg==');

// ── AUTH ──
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  const tok = document.getElementById('token-input').value.trim();
  const err = document.getElementById('login-error');
  if (pwd !== PASS) { err.textContent = 'Incorrect password.'; err.style.display='block'; return; }
  if (tok.length < 10) { err.textContent = 'Please enter your GitHub Personal Access Token.'; err.style.display='block'; return; }
  TOKEN = tok;
  sessionStorage.setItem('admin_auth','1');
  sessionStorage.setItem('admin_token', tok);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  loadPage('index');
}
function doLogout() {
  sessionStorage.clear();
  TOKEN = '';
  location.reload();
}
if (sessionStorage.getItem('admin_auth')==='1' && sessionStorage.getItem('admin_token')) {
  TOKEN = sessionStorage.getItem('admin_token');
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
}

// ── GITHUB API ──
async function ghGet(path) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    headers: { Authorization: `to`+`ken ${TOKEN}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!r.ok) throw new Error(`GitHub API error: ${r.status}`);
  return r.json();
}
async function ghPut(path, content, sha, message) {
  const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: { Authorization: `to`+`ken ${TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: btoa(unescape(encodeURIComponent(content))), sha })
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Save failed'); }
  return r.json();
}

// ── STATE ──
let currentFile = null;
let currentSha  = null;
let currentHTML = null;
let jsonState   = {};  // { file, sha, data }

// ── ACTIVE NAV ──
function setActive(btn) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ═══════════════════════════════════════════
// HTML PAGE EDITOR
// ═══════════════════════════════════════════
async function loadPage(key, btn) {
  if (btn) setActive(btn); else {
    const b = document.querySelector(`.nav-item[onclick="loadPage('${key}')"]`);
    if (b) setActive(b);
  }
  const area = document.getElementById('content-area');
  area.innerHTML = '<div class="loading"><span class="spinner"></span> Loading page...</div>';
  currentFile = key + '.html';
  try {
    const data = await ghGet(currentFile);
    currentSha  = data.sha;
    currentHTML = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    renderHTMLEditor(key);
  } catch(e) {
    area.innerHTML = `<div class="alert alert-warn">Could not load ${currentFile}: ${e.message}</div>`;
  }
}

const PAGE_FIELDS = {
  index: {
    title: 'Home Page', desc: 'Edit homepage text.',
    fields: [
      { label: 'Subtitle / Role', sel: '.hero-subtitle', type: 'text' },
      { label: 'Affiliations', sel: '.hero-affil', type: 'html' },
      { label: 'Bio — Paragraph 1', sel: '.bio p:nth-of-type(1)', type: 'html' },
      { label: 'Bio — Paragraph 2', sel: '.bio p:nth-of-type(2)', type: 'html' },
      { label: 'Bio — Paragraph 3', sel: '.bio p:nth-of-type(3)', type: 'html' },
    ]
  },
  about: {
    title: 'About Page', desc: 'Edit biography chapters.',
    fields: [
      { label: 'Chapter 1 — Para 1', sel: '.chapter:nth-of-type(1) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 1 — Para 2', sel: '.chapter:nth-of-type(1) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 2 — Para 1', sel: '.chapter:nth-of-type(2) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 2 — Para 2', sel: '.chapter:nth-of-type(2) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 3 — Para 1', sel: '.chapter:nth-of-type(3) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 3 — Para 2', sel: '.chapter:nth-of-type(3) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 3 — Para 3', sel: '.chapter:nth-of-type(3) p:nth-of-type(3)', type: 'html' },
      { label: 'Chapter 4 — Para 1', sel: '.chapter:nth-of-type(4) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 4 — Para 2', sel: '.chapter:nth-of-type(4) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 5 — Para 1', sel: '.chapter:nth-of-type(5) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 5 — Para 2', sel: '.chapter:nth-of-type(5) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 5 — Para 3', sel: '.chapter:nth-of-type(5) p:nth-of-type(3)', type: 'html' },
      { label: 'Chapter 5 — Para 4', sel: '.chapter:nth-of-type(5) p:nth-of-type(4)', type: 'html' },
      { label: 'Chapter 6 — Para 1', sel: '.chapter:nth-of-type(6) p:nth-of-type(1)', type: 'html' },
      { label: 'Chapter 6 — Para 2', sel: '.chapter:nth-of-type(6) p:nth-of-type(2)', type: 'html' },
      { label: 'Chapter 6 — Para 3', sel: '.chapter:nth-of-type(6) p:nth-of-type(3)', type: 'html' },
    ]
  },
  contact: {
    title: 'Contact Page', desc: 'Edit contact information.',
    fields: [
      { label: 'Email', sel: 'a[href^="mailto"]', type: 'text' },
      { label: 'Phone', sel: 'a[href^="tel"]', type: 'text' },
    ]
  },
  'project-eue': {
    title: 'EUE Project Page', desc: 'Edit overview and findings text.',
    fields: [
      { label: 'Overview — Para 1', sel: 'section:nth-of-type(1) p:nth-of-type(1)', type: 'html' },
      { label: 'Overview — Para 2', sel: 'section:nth-of-type(1) p:nth-of-type(2)', type: 'html' },
      { label: 'Network Measures — Para 1', sel: 'section:nth-of-type(2) p:nth-of-type(1)', type: 'html' },
      { label: 'Network Measures — Para 2', sel: 'section:nth-of-type(2) p:nth-of-type(2)', type: 'html' },
      { label: 'Network Measures — Para 3', sel: 'section:nth-of-type(2) p:nth-of-type(3)', type: 'html' },
      { label: 'Key Findings — Para 1', sel: 'section:last-of-type p:nth-of-type(1)', type: 'html' },
      { label: 'Key Findings — Para 2', sel: 'section:last-of-type p:nth-of-type(2)', type: 'html' },
      { label: 'Key Findings — Para 3', sel: 'section:last-of-type p:nth-of-type(3)', type: 'html' },
    ]
  },
  'project-fdi': {
    title: 'FDI Project Page', desc: 'Edit overview and findings text.',
    fields: [
      { label: 'Overview — Para 1', sel: 'section:nth-of-type(1) p:nth-of-type(1)', type: 'html' },
      { label: 'Overview — Para 2', sel: 'section:nth-of-type(1) p:nth-of-type(2)', type: 'html' },
      { label: 'Index Description — Para 1', sel: 'section:nth-of-type(2) p:nth-of-type(1)', type: 'html' },
      { label: 'Index Description — Para 2', sel: 'section:nth-of-type(2) p:nth-of-type(2)', type: 'html' },
      { label: 'Key Findings — Para 1', sel: 'section:last-of-type p:nth-of-type(1)', type: 'html' },
      { label: 'Key Findings — Para 2', sel: 'section:last-of-type p:nth-of-type(2)', type: 'html' },
      { label: 'Key Findings — Para 3', sel: 'section:last-of-type p:nth-of-type(3)', type: 'html' },
    ]
  },
  teaching: {
    title: 'Teaching Philosophy', desc: 'Edit the teaching philosophy text. To add/remove courses use Teaching Courses in the sidebar.',
    fields: [
      { label: 'Philosophy — Para 1', sel: 'section:nth-of-type(1) p:nth-of-type(1)', type: 'html' },
      { label: 'Philosophy — Para 2', sel: 'section:nth-of-type(1) p:nth-of-type(2)', type: 'html' },
      { label: 'Philosophy — Para 3', sel: 'section:nth-of-type(1) p:nth-of-type(3)', type: 'html' },
    ]
  },
};

function getFromHTML(html, sel) {
  const d = document.createElement('div');
  d.innerHTML = html;
  const el = d.querySelector(sel);
  return el ? el.innerHTML.trim() : '';
}
function setInHTML(html, sel, val) {
  const d = document.createElement('div');
  d.innerHTML = html;
  const el = d.querySelector(sel);
  if (el) el.innerHTML = val;
  return d.innerHTML;
}

function renderHTMLEditor(key) {
  const cfg = PAGE_FIELDS[key];
  const area = document.getElementById('content-area');
  if (!cfg) { area.innerHTML = `<h2>${key}</h2><p class="page-desc">No editor for this page.</p>`; return; }
  let html = `<h2>${cfg.title}</h2><p class="page-desc">${cfg.desc}</p>
    <div class="alert alert-info">Changes save directly to GitHub and go live in 1-2 minutes.</div>
    <div id="fields">`;
  cfg.fields.forEach((f, i) => {
    const val = getFromHTML(currentHTML, f.sel) || '';
    const input = f.type === 'text'
      ? `<input class="field" data-idx="${i}" value="${val.replace(/"/g,'&quot;')}"/>`
      : `<textarea class="field" data-idx="${i}" rows="3">${val}</textarea>`;
    html += `<div class="editor-card" id="card-${i}">
      <div class="editor-card-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="editor-label">${f.label}</span>
        <span class="editor-toggle">▼</span>
      </div>
      <div class="editor-body"><div class="field-group">${input}</div></div>
    </div>`;
  });
  html += `</div><div class="save-bar">
    <button class="btn-save" id="save-btn" onclick="saveHTML('${key}')">Save &amp; Publish</button>
    <span class="save-status" id="save-status"></span>
  </div>`;
  area.innerHTML = html;
}

async function saveHTML(key) {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true; status.className='save-status saving'; status.textContent='Saving...';
  try {
    const cfg = PAGE_FIELDS[key];
    let html = currentHTML;
    document.querySelectorAll('#fields [data-idx]').forEach(el => {
      const f = cfg.fields[+el.dataset.idx];
      html = setInHTML(html, f.sel, el.value);
    });
    await ghPut(currentFile, html, currentSha, `Dashboard update: ${currentFile}`);
    currentHTML = html;
    const fresh = await ghGet(currentFile);
    currentSha = fresh.sha;
    status.className='save-status ok'; status.textContent='Saved and published!';
    setTimeout(()=>{ status.textContent=''; }, 4000);
  } catch(e) {
    status.className='save-status err'; status.textContent='Error: '+e.message;
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════
// JSON DATA EDITOR
// ═══════════════════════════════════════════
const JSON_SCHEMAS = {
  publications: {
    title: 'Publications',
    desc: 'Add, edit or remove publications.',
    file: 'publications.json',
    fields: [
      { key:'year',     label:'Year',     wide: false },
      { key:'authors',  label:'Authors',  wide: true  },
      { key:'title',    label:'Title',    wide: true  },
      { key:'journal',  label:'Journal',  wide: true  },
      { key:'doi',      label:'DOI URL',  wide: true  },
      { key:'abstract', label:'Abstract', textarea: true },
    ]
  },
  awards: {
    title: 'Awards & Grants',
    desc: 'Add, edit or remove awards.',
    file: 'awards.json',
    fields: [
      { key:'year',        label:'Year',        wide: false },
      { key:'title',       label:'Title',       wide: true  },
      { key:'institution', label:'Institution', wide: true  },
      { key:'amount',      label:'Amount',      wide: true  },
      { key:'description', label:'Description', textarea: true },
    ]
  },
  courses: {
    title: 'Teaching Courses',
    desc: 'Add, edit or remove courses.',
    file: 'courses.json',
    fields: [
      { key:'category',    label:'Category', hint:'Methods & Statistics | Inequality & Stratification | Environmental Sociology | General Education', wide: true },
      { key:'title',       label:'Title',    wide: true },
      { key:'code',        label:'Code / Info', wide: true },
      { key:'description', label:'Description', textarea: true },
    ]
  }
};

async function loadJSON(type) {
  const b = document.querySelector(`.nav-item[onclick="loadJSON('${type}')"]`);
  if (b) setActive(b);
  const schema = JSON_SCHEMAS[type];
  const area = document.getElementById('content-area');
  area.innerHTML = `<div class="loading"><span class="spinner"></span> Loading ${schema.file}...</div>`;
  try {
    const res = await ghGet(schema.file);
    const raw = decodeURIComponent(escape(atob(res.content.replace(/\n/g,''))));
    jsonState = { type, file: schema.file, sha: res.sha, data: JSON.parse(raw) };
    renderJSONEditor(schema, jsonState.data);
  } catch(e) {
    area.innerHTML = `<div class="alert alert-warn">Could not load ${schema.file}: ${e.message}</div>`;
  }
}

function renderJSONEditor(schema, items) {
  const area = document.getElementById('content-area');
  let html = `<h2>${schema.title}</h2><p class="page-desc">${schema.desc}</p>
    <div class="alert alert-info">Changes save directly to GitHub and go live in 1-2 minutes.</div>
    <button class="btn-add" onclick="addItem()">+ Add ${schema.title.replace(/s$/,'')}</button>
    <div id="json-list">`;
  items.forEach((item, i) => {
    html += renderItem(schema, item, i);
  });
  html += `</div><div class="save-bar">
    <button class="btn-save" id="save-btn" onclick="saveJSON()">Save &amp; Publish</button>
    <span class="save-status" id="save-status"></span>
  </div>`;
  area.innerHTML = html;
}

function renderItem(schema, item, i) {
  let f = '<div class="list-item">';
  // Year + first wide field side by side if year is narrow
  const yearField = schema.fields.find(f => !f.wide && !f.textarea);
  const otherFields = schema.fields.filter(f => f !== yearField);
  if (yearField) {
    const wideFirst = otherFields.find(f => f.wide);
    const rest = otherFields.filter(f => f !== wideFirst);
    if (wideFirst) {
      f += `<div class="item-grid-2" style="margin-bottom:0.5rem;">
        <div><div class="field-label">${yearField.label}</div>
          <input class="field" data-key="${yearField.key}" value="${esc(item[yearField.key]||'')}"/></div>
        <div><div class="field-label">${wideFirst.label}</div>
          <input class="field" data-key="${wideFirst.key}" value="${esc(item[wideFirst.key]||'')}"/></div>
      </div>`;
      rest.forEach(fd => {
        f += renderField(fd, item);
      });
    } else {
      schema.fields.forEach(fd => { f += renderField(fd, item); });
    }
  } else {
    schema.fields.forEach(fd => { f += renderField(fd, item); });
  }
  f += `<button class="btn-remove" onclick="this.closest('.list-item').remove()">Remove</button>`;
  f += '</div>';
  return f;
}

function renderField(fd, item) {
  const val = item[fd.key] || '';
  const hint = fd.hint ? `<span style="font-weight:400;font-style:italic;opacity:0.6;font-size:0.7rem;"> (${fd.hint})</span>` : '';
  if (fd.textarea) {
    return `<div class="field-group"><div class="field-label">${fd.label}</div>
      <textarea class="field" data-key="${fd.key}" rows="3">${val.replace(/</g,'&lt;')}</textarea></div>`;
  }
  return `<div class="field-group"><div class="field-label">${fd.label}${hint}</div>
    <input class="field" type="text" data-key="${fd.key}" value="${esc(val)}"/></div>`;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addItem() {
  const schema = JSON_SCHEMAS[jsonState.type];
  const empty = {};
  schema.fields.forEach(f => empty[f.key] = '');
  const list = document.getElementById('json-list');
  list.insertAdjacentHTML('beforeend', renderItem(schema, empty, list.children.length));
  list.lastElementChild.scrollIntoView({ behavior:'smooth' });
}

async function saveJSON() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true; status.className='save-status saving'; status.textContent='Saving...';
  try {
    const schema = JSON_SCHEMAS[jsonState.type];
    const items = [];
    document.querySelectorAll('#json-list .list-item').forEach(el => {
      const item = {};
      el.querySelectorAll('[data-key]').forEach(inp => {
        item[inp.dataset.key] = inp.tagName === 'TEXTAREA' ? inp.value : inp.value;
      });
      items.push(item);
    });
    const newContent = JSON.stringify(items, null, 2);
    await ghPut(jsonState.file, newContent, jsonState.sha, `Dashboard update: ${jsonState.file}`);
    jsonState.data = items;
    const fresh = await ghGet(jsonState.file);
    jsonState.sha = fresh.sha;
    status.className='save-status ok'; status.textContent='Saved and published!';
    setTimeout(()=>{ status.textContent=''; }, 4000);
  } catch(e) {
    status.className='save-status err'; status.textContent='Error: '+e.message;
  }
  btn.disabled = false;
}

// Init
window.addEventListener('load', () => {
  if (sessionStorage.getItem('admin_auth')==='1') loadPage('index');
});
</script>
